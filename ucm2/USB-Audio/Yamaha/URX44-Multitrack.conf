Include.pcm_split.File "/common/pcm/split.conf"

Macro [
	{
		SplitPCM {
			Name "yamaha_urx44_stereo_out"
			Direction Playback
			Channels 2
			HWChannels 18
			HWChannelPos0 FL
			HWChannelPos1 FR
		}
	}
	{
		SplitPCM {
			Name "yamaha_urx44_stereo_in"
			Direction Capture
			Channels 2
			HWChannels 18
			HWChannelPos0 FL
			HWChannelPos1 FR
		}
	}
	{
		SplitPCM {
			Name "yamaha_urx44_mono_in"
			Direction Capture
			Channels 1
			HWChannels 6
			HWChannelPos6 MONO
			HWChannelPos7 MONO
			HWChannelPos8 MONO
			HWChannelPos9 MONO
		}
	}
]

SectionDevice."Line1" {
	Comment "USB MAIN A"

	Value {
		PlaybackPriority 180
	}
	Macro.pcm_split.SplitPCMDevice {
		Name "yamaha_urx44_stereo_out"
		Direction Playback
		HWChannels 18
		Channels 2
		Channel0 0
		Channel1 1
		ChannelPos0 FL
		ChannelPos1 FR
	}
}

